<svg xmlns="http://www.w3.org/2000/svg" width="400" height="140" viewBox="0 0 400 140" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
  </defs>

  <!-- Círculo de fondo con icono veterinario -->
  <circle cx="60" cy="70" r="45" fill="url(#grad)" opacity="0.1" />
  <circle cx="60" cy="70" r="36" fill="url(#grad)" opacity="0.2" />

  <!-- Cruz veterinaria (médica) estilizada -->
  <g transform="translate(60, 70)">
    <!-- Cruz -->
    <rect x="-18" y="-6" width="36" height="12" rx="3" fill="#22c55e" />
    <rect x="-6" y="-18" width="12" height="36" rx="3" fill="#22c55e" />
    <!-- Huella de mascota integrada -->
    <circle cx="0" cy="0" r="7" fill="#fff" opacity="0.9" />
    <circle cx="-10" cy="-10" r="4" fill="#22c55e" opacity="0.3" />
    <circle cx="10" cy="-10" r="4" fill="#22c55e" opacity="0.3" />
    <circle cx="-10" cy="10" r="4" fill="#22c55e" opacity="0.3" />
    <circle cx="10" cy="10" r="4" fill="#22c55e" opacity="0.3" />
  </g>

  <!-- Texto "Sana Vet" -->
  <text x="125" y="65" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" fill="#1f2937" letter-spacing="1.5">
    Sana
    <tspan fill="#22c55e">Vet</tspan>
  </text>

  <!-- Línea decorativa -->
  <line x1="125" y1="80" x2="370" y2="80" stroke="#22c55e" stroke-width="2" stroke-linecap="round" opacity="0.4" />

  <!-- Texto "Sistema de Gestión Veterinaria" -->
  <text x="125" y="102" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="500" fill="#6b7280" letter-spacing="2.5">
    SISTEMA DE GESTIÓN VETERINARIA
  </text>
</svg>
